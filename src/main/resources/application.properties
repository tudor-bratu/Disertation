spring.application.name=DisertationBE
spring.datasource.url=jdbc:h2:file:/Users/tudorbratu/Desktop/Development/DisertationBE/data/appdb;AUTO_SERVER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-hours=24
mercury.api-key=${INCEPTION_API_KEY}
mercury.base-url=https://api.inceptionlabs.ai/v1
mercury.connect-timeout-ms=5000
mercury.read-timeout-ms=30000
lint.gatekeeping.enabled=true
lint.gatekeeping.max-warnings=10
lint.guard.enabled=true
lint.guard.max-chars=20000
ratelimit.augment.capacity=120
ratelimit.augment.refill-per-minute=120
ratelimit.lint.capacity=30
ratelimit.lint.refill-per-minute=30
ratelimit.export.capacity=10
ratelimit.export.refill-per-minute=10
